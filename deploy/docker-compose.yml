version: '3.8'

services:
  fineract-backoffice-ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: fineract-backoffice-ui:latest
    ports:
      - '8080:80'
    environment:
      - FINERACT_API_URL=https://demo.mifos.io/fineract-provider/api
      - DEFAULT_TENANT=default
    restart: unless-stopped
    networks:
      - fineract-network

networks:
  fineract-network:
    driver: bridge
