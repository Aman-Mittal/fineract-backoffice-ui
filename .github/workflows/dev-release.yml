name: Dev Release CI

on:
  push:
    branches:
      - dev-release
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build -- --configuration production --base-href /fineract-backoffice-ui/dev/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-build
          path: dist/fineract-backoffice-ui/browser

      - name: Deploy to GitHub Pages (dev subdirectory)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/fineract-backoffice-ui/browser
          destination_dir: dev
          keep_files: true
