name: CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  dependencies:
    name: Dependency Integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Verify clean install
        run: npm ci

  lint:
    name: TS/ESLint
    needs: dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      - name: Lint TypeScript files
        run: npm run lint

  html-lint:
    name: HTML Lint
    needs: dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      - name: Lint HTML files
        run: npx --no-install eslint "src/**/*.html"

  format:
    name: Format Check
    needs: dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check

  i18n-check:
    name: Translation Check
    needs: dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      - name: Verify translations
        run: npm run i18n:check

  test:
    name: Unit Tests
    needs: dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      - name: Run Tests with Coverage
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage
      - name: Upload Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: coverage/fineract-backoffice-ui/
          retention-days: 7

  build:
    name: Production Build
    needs: dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  compliance:
    name: License Compliance
    needs: dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      - name: Check Apache license headers (Custom Script)
        run: ./scripts/check-license.sh
      - name: Check dependency licenses
        run: npx --no-install license-checker --production --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD"

  rat-scan:
    name: Apache RAT Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - name: Set up JDK
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download Apache RAT
        run: |
          curl -sL https://repo1.maven.org/maven2/org/apache/rat/apache-rat/0.17/apache-rat-0.17.jar -o apache-rat-0.17.jar
          echo "401939ebe5a52c6ed524029897bf914eaaba503d36c069ebcdbd8847a9e7cf93  apache-rat-0.17.jar" | sha256sum --check --status || {
            echo "::error::Apache RAT jar checksum verification failed. Aborting."
            exit 1
          }
      - name: Run Apache RAT Scan
        run: |
          java -jar apache-rat-0.17.jar -E .rat-excludes -d .

  security:
    name: Security Audit
    needs: dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      # --omit=dev audits only runtime (production) dependencies.
      # Build tooling vulnerabilities (esbuild, vite) are excluded as they
      # are never deployed and have no upstream fix available.
      - run: npm audit --audit-level=high --omit=dev

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs:
      [
        dependencies,
        lint,
        html-lint,
        format,
        i18n-check,
        test,
        build,
        compliance,
        rat-scan,
        security,
      ]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Generate Summary
        run: |
          echo "## 🚀 Fineract Backoffice UI - CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Status Overview" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ needs.dependencies.result == 'success' && '✅ Integrity Verified' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TS Linting | ${{ needs.lint.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML Linting | ${{ needs.html-lint.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Formatting | ${{ needs.format.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Translation Check | ${{ needs.i18n-check.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result == 'success' && '✅ Pass (Artifact Uploaded)' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Prod Build | ${{ needs.build.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compliance | ${{ needs.compliance.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RAT Scan | ${{ needs.rat-scan.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🛡️ Security & Compliance Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Dependency Integrity:** Enforced via \`npm ci\`. This prevents the use of \`--legacy-peer-deps\`." >> $GITHUB_STEP_SUMMARY
          echo "- **HTML Quality:** Explicitly checking templates for accessibility and structural best practices via \`angular-eslint\`." >> $GITHUB_STEP_SUMMARY
          echo "- **Vulnerability Audit:** Completed with \`npm audit --audit-level=high --omit=dev\`. Production runtime is clean." >> $GITHUB_STEP_SUMMARY
          echo "- **Offline Analysis:** Integrated \`SonarJS\` rules via ESLint for continuous quality tracking." >> $GITHUB_STEP_SUMMARY
          echo "- **License Audit:** Apache RAT scan verified 0 unapproved files." >> $GITHUB_STEP_SUMMARY
